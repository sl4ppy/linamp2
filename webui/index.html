<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Linamp Remote</title>
<link rel="stylesheet" href="/app.css">
</head>
<body>
  <main class="wrap">
    <header>
      <h1>LINAMP <span class="dim">REMOTE</span></h1>
      <div id="conn" class="conn off">connecting…</div>
    </header>

    <nav class="tabs">
      <button class="tab on" data-tab="player">Player</button>
      <button class="tab" data-tab="playlist">Playlist</button>
      <button class="tab" data-tab="files">Files</button>
      <button class="tab" data-tab="sources">Sources</button>
      <button class="tab" data-tab="clocks">Clocks</button>
    </nav>
    <div id="tab-player" class="panel">
    <section class="screen">
      <div class="screen-info">
        <div id="track" class="track">—</div>
        <div class="meta">
          <span id="bitrate">—</span> kbps · <span id="srate">—</span> kHz ·
          <span id="chan">—</span>
        </div>
        <div class="flags">
          <span id="f-eq" class="flag">EQ</span>
          <span id="f-pl" class="flag">PL</span>
          <span id="f-shuffle" class="flag">SHUF</span>
          <span id="f-repeat" class="flag">REP</span>
        </div>
      </div>
    </section>

    <section class="seek">
      <input id="seek" type="range" min="0" max="1000" value="0">
      <div class="time"><span id="pos">0:00</span><span id="dur">0:00</span></div>
    </section>

    <section class="transport">
      <button id="prev"  class="tbtn" title="Previous">⏮</button>
      <button id="play"  class="tbtn" title="Play">⏵</button>
      <button id="pause" class="tbtn" title="Pause">⏸</button>
      <button id="stop"  class="tbtn" title="Stop">⏹</button>
      <button id="next"  class="tbtn" title="Next">⏭</button>
      <button id="shuffle" class="tbtn tog" title="Shuffle">🔀</button>
      <button id="repeat"  class="tbtn tog" title="Repeat">🔁</button>
    </section>

    <section class="rows">
      <div class="row"><span class="lbl">vol</span>
        <input id="vol" type="range" min="0" max="100" value="0"><span id="volv" class="val">0</span></div>
      <div class="row"><span class="lbl">bal</span>
        <input id="bal" type="range" min="-100" max="100" value="0"><span id="balv" class="val">C</span></div>
      <div class="row"><span class="lbl">src</span><span id="source" class="val">—</span>
        <span class="lbl">state</span><span id="state" class="val">stopped</span></div>
    </section>
    </div>
    <div id="tab-playlist" class="panel hidden">
      <div class="pl-head"><span id="pl-count">0 tracks</span>
        <button id="pl-clear" class="minibtn">Clear</button></div>
      <ul id="pl-list" class="pl-list"></ul>
    </div>
    <div id="tab-files" class="panel hidden">
      <div class="fb-head"><button id="fb-up" class="minibtn">⬆ Up</button>
        <span id="fb-path" class="fb-path">/</span></div>
      <ul id="fb-list" class="fb-list"></ul>
    </div>
    <div id="tab-sources" class="panel hidden">
      <div class="sec-head">Audio source</div>
      <div id="src-list" class="src-list"></div>
      <div class="sec-head">VBAN streaming</div>
      <button id="vban-btn" class="bigtog">VBAN: —</button>
    </div>
    <div id="tab-clocks" class="panel hidden">
      <div class="sec-head">Screensaver</div>
      <div class="ss-row">
        <button id="ss-on" class="minibtn">Show (random)</button>
        <button id="ss-off" class="minibtn">Dismiss</button>
      </div>
      <div class="sec-head">Clock faces</div>
      <div id="clock-grid" class="clock-grid"></div>
    </div>
  </main>
  <script type="module" src="/app.js"></script>
</body>
</html>
